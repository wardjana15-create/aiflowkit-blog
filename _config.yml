# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: AI FlowKit
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Mastering AI workflows and productivity tools for solopreneurs and small businesses.
  Your guide to building automated systems that save time and make money.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# Author info
author:
  name: Your Name Here

# Header pages
# These are the links that will appear in your main menu.
# The title is what users see. The url should match the path to a page you will create.
header_pages:
  - about.md
  - categories.md
  - contact.md

# Social media links
# These will appear as icons in the footer.
# You can add: email, facebook, flickr, github, instagram, linkedin, pinterest,
# rss, twitter, vimeo, youtube, youtube_channel, youtube_channel_name
minima:
  social_links:
    - { platform: twitter,  user_url: "https://twitter.com/your_username" }
    - { platform: github,   user_url: "https://github.com/your_username" }
    - { platform: linkedin, user_url: "https://www.linkedin.com/in/your_username" }

# Build settings
theme: minima
plugins:
  - jekyll-feed


